<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>تحصيلي — الاشتراك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  .paywall-screen {
    background: #000;
    color: #fff;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .paywall-bg {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 300px;
    height: 300px;
    background: var(--g);
    filter: blur(120px);
    opacity: 0.3;
    z-index: 0;
  }
  .paywall-content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .paywall-icon {
    font-size: 4rem;
    margin-bottom: 24px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .paywall-title {
    font-size: 2.2rem;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .paywall-sub {
    font-size: 1rem;
    color: rgba(255,255,255,0.6);
    margin-bottom: 40px;
  }
  .trial-box {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 20px;
    border-radius: 24px;
    width: 100%;
    margin-bottom: 24px;
    text-align: right;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .trial-tag {
    background: var(--g);
    color: #000;
    padding: 4px 12px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 800;
  }
  .plan-card {
    background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
    border: 2px solid var(--g);
    padding: 24px;
    border-radius: 28px;
    width: 100%;
    margin-bottom: 40px;
    text-align: right;
    position: relative;
  }
  .plan-price {
    font-size: 2.5rem;
    font-weight: 900;
    margin: 12px 0;
  }
  .btn-pay {
    background: var(--g);
    color: #000;
    width: 100%;
    padding: 20px;
    border-radius: 20px;
    font-size: 1.2rem;
    font-weight: 800;
    border: none;
    cursor: pointer;
    margin-bottom: 16px;
    box-shadow: 0 10px 30px rgba(0, 200, 150, 0.3);
  }
  .btn-skip {
    color: rgba(255,255,255,0.4);
    background: none;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="dynamic-island"></div>
  <div class="screen active">
    <div class="paywall-screen">
      <div class="paywall-bg"></div>
      <div class="paywall-content">
        <div class="paywall-icon"><i data-lucide="rocket" style="width:64px; height:64px; color:var(--g);"></i></div>
        <div class="paywall-title">استعد للقمة مع النسخة الكاملة</div>
        <div class="paywall-sub">افتح جميع المميزات والأسئلة وابدأ تدريبك بذكاء</div>
        
        <div class="trial-box">
          <div>
            <div style="font-weight:800; font-size:1.1rem;">فترة تجريبية مجانية</div>
            <div style="font-size:0.8rem; opacity:0.6;">ابدأ الآن وادفع لاحقاً</div>
          </div>
          <div class="trial-tag">٧ أيام مجاناً</div>
        </div>

        <div style="display:flex; gap:12px; width:100%; margin-bottom:32px;">
          <div class="plan-card" style="flex:1; margin-bottom:0; border-color:rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); padding:20px;" onclick="selectPlan(this)">
            <div style="font-size:0.75rem; opacity:0.6;">الاشتراك الشهري</div>
            <div style="font-size:1.5rem; font-weight:900; margin:8px 0;">٢٠ <span style="font-size:0.75rem; opacity:0.4;">ريال / شهر</span></div>
            <div style="font-size:0.65rem; color:var(--g);">تجربة ٧ أيام</div>
          </div>
          
          <div class="plan-card selected" style="flex:1; margin-bottom:0; padding:20px;" onclick="selectPlan(this)">
            <div class="trial-tag" style="position:absolute; top:-10px; left:10px; font-size:0.6rem; padding:2px 8px;">الأكثر توفيراً</div>
            <div style="font-size:0.75rem; opacity:0.6;">الاشتراك السنوي</div>
            <div style="font-size:1.5rem; font-weight:900; margin:8px 0;">١٢٠ <span style="font-size:0.75rem; opacity:0.4;">ريال / سنة</span></div>
            <div style="font-size:0.65rem; color:var(--g);">وفر ٥٠٪ الآن</div>
          </div>
        </div>

        <button class="btn-pay" onclick="goTo('home')">ابدأ تجربتك المجانية</button>
        <button class="btn-skip" onclick="goTo('home')">ربما لاحقاً</button>
      </div>
    </div>
  </div>
</div>
<script>
  function selectPlan(el) {
    document.querySelectorAll('.plan-card').forEach(c => {
      c.classList.remove('selected');
      c.style.borderColor = 'rgba(255,255,255,0.1)';
      c.style.background = 'rgba(255,255,255,0.05)';
    });
    el.classList.add('selected');
    el.style.borderColor = 'var(--g)';
    el.style.background = 'linear-gradient(135deg, #1a1a1a, #0a0a0a)';
  }
</script>
<script src="app.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
