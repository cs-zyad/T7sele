<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>تحصيلي — UI Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="phone-frame">
  <div class="dynamic-island"></div>
  <!-- ════════ SCREEN: PROGRESS ════════ -->
  <div class="screen active" id="progress-screen">
    <div class="status-bar light">
      <span class="status-time">9:41</span>
      <span class="status-icons" style="color:var(--ink)">▲ ◆ ▮▮▮</span>
    </div>
    <div class="screen-body">
      <div class="progress-header">
        <div class="progress-header-title">تقدمي 
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="vertical-align: middle; margin-right: 4px;">
            <polyline points="22,12 18,12 15,21 9,3 6,12 2,12" stroke="var(--ink)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="progress-header-sub">أداؤك منذ بداية الاستعداد</div>
      </div>

      <div class="progress-body">
        <!-- Weekly -->
        <div class="prog-card">
          <div class="prog-card-title">الأسبوع الحالي</div>
          <div class="weekly-row">
            <div class="week-day">
              <div class="week-day-name">ن</div>
              <div class="week-day-circle wdc-done">✓</div>
            </div>
            <div class="week-day">
              <div class="week-day-name">ث</div>
              <div class="week-day-circle wdc-done">✓</div>
            </div>
            <div class="week-day">
              <div class="week-day-name">ث</div>
              <div class="week-day-circle wdc-miss">✗</div>
            </div>
            <div class="week-day">
              <div class="week-day-name">خ</div>
              <div class="week-day-circle wdc-done">✓</div>
            </div>
            <div class="week-day">
              <div class="week-day-name">ج</div>
              <div class="week-day-circle wdc-today">●</div>
            </div>
            <div class="week-day">
              <div class="week-day-name">س</div>
              <div class="week-day-circle wdc-future">-</div>
            </div>
            <div class="week-day">
              <div class="week-day-name">ح</div>
              <div class="week-day-circle wdc-future">-</div>
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-num" style="color:var(--orange)">🔥١٢</div>
            <div class="stat-label">يوم متواصل</div>
          </div>
          <div class="stat-card">
            <div class="stat-num g">٦٣٠</div>
            <div class="stat-label">سؤال حُليت</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">٧٦٪</div>
            <div class="stat-label">دقة عامة</div>
          </div>
        </div>

        <!-- Subjects -->
        <div class="prog-card">
          <div class="prog-card-title">أداء المواد</div>
          <div class="subj-list">
            <div class="subj-row">
              <div class="subj-top">
                <div class="subj-info">
                  <div class="subj-dot" style="background:#4F8EF7"></div>
                  <div>
                    <div class="subj-name">الرياضيات</div>
                    <div class="subj-count">٢١٠ سؤال</div>
                  </div>
                </div>
                <div class="subj-pct">٨٧٪</div>
              </div>
              <div class="subj-track"><div class="subj-bar" style="width:87%;background:linear-gradient(90deg,#3a6fd8,#4F8EF7)"></div></div>
            </div>
            <div class="subj-row">
              <div class="subj-top">
                <div class="subj-info">
                  <div class="subj-dot" style="background:var(--red)"></div>
                  <div>
                    <div class="subj-name">الأحياء ⚠️</div>
                    <div class="subj-count">١٨٠ سؤال</div>
                  </div>
                </div>
                <div class="subj-pct low">٦٢٪</div>
              </div>
              <div class="subj-track"><div class="subj-bar low" style="width:62%"></div></div>
            </div>
            <div class="subj-row">
              <div class="subj-top">
                <div class="subj-info">
                  <div class="subj-dot" style="background:var(--g)"></div>
                  <div>
                    <div class="subj-name">الكيمياء</div>
                    <div class="subj-count">١٤٠ سؤال</div>
                  </div>
                </div>
                <div class="subj-pct">٩٠٪</div>
              </div>
              <div class="subj-track"><div class="subj-bar" style="width:90%"></div></div>
            </div>
            <div class="subj-row">
              <div class="subj-top">
                <div class="subj-info">
                  <div class="subj-dot" style="background:#FF9500"></div>
                  <div>
                    <div class="subj-name">الفيزياء</div>
                    <div class="subj-count">١٠٠ سؤال</div>
                  </div>
                </div>
                <div class="subj-pct">٧٨٪</div>
              </div>
              <div class="subj-track"><div class="subj-bar" style="width:78%;background:linear-gradient(90deg,#cc7000,#FF9500)"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="navbar">
      <div class="nav-item" onclick="goTo('home')">
        <div class="nav-active-pill"></div>
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 10L12 3L21 10V20C21 20.55 20.55 21 20 21H16V15H8V21H4C3.45 21 3 20.55 3 20V10Z" stroke-width="1.8" stroke-linejoin="round"/>
            <rect x="8" y="15" width="8" height="6" rx="1" fill="#00C896" opacity="0.25"/>
          </svg>
        </div>
        <div class="nav-label">الرئيسية</div>
        <div class="nav-active-dot"></div>
      </div>
      <div class="nav-item" onclick="goTo('session')">
        <div class="nav-active-pill"></div>
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="4" y="3" width="13" height="18" rx="2" stroke-width="1.8"/>
            <line x1="4" y1="3" x2="4" y2="21" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="9" y1="9" x2="14" y2="9" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="9" y1="13" x2="14" y2="13" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="9" y1="17" x2="12" y2="17" stroke-width="1.4" stroke-linecap="round"/>
            <circle cx="19" cy="18" r="3.5" fill="#0D1F1A" stroke-width="1.4"/>
            <line x1="19" y1="16.5" x2="19" y2="19.5" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="17.5" y1="18" x2="20.5" y2="18" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="nav-label">جلستي</div>
        <div class="nav-active-dot"></div>
      </div>
      <div class="nav-item active" onclick="goTo('progress-screen')">
         <div class="nav-active-pill"></div>
         <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="3" y="16" width="4" height="6" rx="1.5" fill="currentColor" opacity="0.5"/>
            <rect x="10" y="11" width="4" height="11" rx="1.5" fill="currentColor" opacity="0.7"/>
            <rect x="17" y="6" width="4" height="16" rx="1.5" fill="currentColor"/>
            <polyline points="17,4 19.5,1.5 22,4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="19.5" y1="1.5" x2="19.5" y2="7" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
         </div>
         <div class="nav-label">تقدمي</div>
         <div class="nav-active-dot"></div>
      </div>
      <div class="nav-item disabled">
        <div class="nav-active-pill"></div>
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none">
             <path d="M7 4H17V13C17 16.31 14.76 19 12 19C9.24 19 7 16.31 7 13V4Z" stroke-width="1.8" stroke-linejoin="round"/>
             <path d="M7 7C5.5 7 4 8 4 10C4 12 5.5 13 7 13" stroke-width="1.5" stroke-linecap="round"/>
             <path d="M17 7C18.5 7 20 8 20 10C20 12 18.5 13 17 13" stroke-width="1.5" stroke-linecap="round"/>
             <line x1="12" y1="19" x2="12" y2="22" stroke-width="1.8" stroke-linecap="round"/>
             <line x1="9" y1="22" x2="15" y2="22" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="coming-soon-tag">قريباً</div>
        <div class="nav-label">منافسة</div>
      </div>
      <div class="nav-item" onclick="goTo('settings')">
        <div class="nav-active-pill"></div>
        <div class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke-width="1.8"/>
            <path d="M12 2V4M12 20V22M2 12H4M20 12H22M4.93 4.93L6.34 6.34M17.66 17.66L19.07 19.07M19.07 4.93L17.66 6.34M6.34 17.66L4.93 19.07" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="nav-label">إعدادات</div>
        <div class="nav-active-dot"></div>
      </div>
    </div>
  </div>


</div>
<script src="app.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
