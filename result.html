<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>تحصيلي — UI Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="phone-frame">
  <div class="dynamic-island"></div>
  <!-- ════════ SCREEN: RESULT ════════ -->
  <div class="screen active" id="result">
    <div class="status-bar dark">
      <span class="status-time">9:41</span>
      <span class="status-icons">▲ ◆ ▮▮▮</span>
    </div>
    <div class="screen-body" style="padding-top:0;">
      <div class="result-header">
        <div class="result-ring">
          <div class="result-score">١٦</div>
          <div class="result-total">من ٢٠</div>
        </div>
        <div class="result-title" style="display:flex; align-items:center; justify-content:center; gap:8px;">أحسنت! 
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke="var(--g)" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="result-sub">٨٠٪ دقة · اليوم ١٢ متواصل</div>
      </div>

      <div class="result-body">
        <div class="result-section">
          <div class="result-section-title" style="display:flex; align-items:center; gap:8px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M18 20V10M12 20V4M6 20V14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
             الأداء لكل مادة
          </div>
          <div class="result-bars">
            <div class="result-bar-row">
              <div class="rbar-top">
                <div class="rbar-name">الرياضيات</div>
                <div class="rbar-pct">٨٧٪</div>
              </div>
              <div class="rbar-track"><div class="rbar-fill" style="width:87%"></div></div>
            </div>
            <div class="result-bar-row">
              <div class="rbar-top">
                <div class="rbar-name">الأحياء</div>
                <div class="rbar-pct low">٦٢٪</div>
              </div>
              <div class="rbar-track"><div class="rbar-fill low" style="width:62%"></div></div>
            </div>
            <div class="result-bar-row">
              <div class="rbar-top">
                <div class="rbar-name">الكيمياء</div>
                <div class="rbar-pct">٩٠٪</div>
              </div>
              <div class="rbar-track"><div class="rbar-fill" style="width:90%"></div></div>
            </div>
          </div>
        </div>

        <div class="result-alert">
          <div class="alert-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
              <line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <circle cx="12" cy="16" r="1" fill="currentColor"/>
            </svg>
          </div>
          <div class="alert-text">غداً سيزيد التطبيق أسئلة الأحياء لـ ١٢ سؤال لتقوية نقطة ضعفك</div>
        </div>

        <div class="divider"></div>

        <div class="coming-card">
          <div class="coming-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
              <path d="M7 4H17V13C17 16.31 14.76 19 12 19C9.24 19 7 16.31 7 13V4Z" stroke="var(--g)" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M7 7C5.5 7 4 8 4 10C4 12 5.5 13 7 13" stroke="var(--g)" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M17 7C18.5 7 20 8 20 10C20 12 18.5 13 17 13" stroke="var(--g)" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="12" y1="19" x2="12" y2="22" stroke="var(--g)" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="9" y1="22" x2="15" y2="22" stroke="var(--g)" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="coming-title">المنافسة مع الأصدقاء</div>
          <div class="coming-sub">قريباً — سجّل اهتمامك الآن</div>
          <button class="coming-btn" onclick="goTo('coming')">سجّل اهتمامي</button>
        </div>

        <div class="divider"></div>

        <div class="result-btns">
          <button class="btn-mistakes" onclick="goTo('progress-screen')" style="display:flex; align-items:center; justify-content:center; gap:8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <rect x="4" y="3" width="13" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/>
              <line x1="4" y1="3" x2="4" y2="21" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            شوف كل الأخطاء
          </button>
          <button class="btn-home" onclick="goTo('home')">← العودة للرئيسية</button>
        </div>
      </div>
    </div>
  </div>


</div>
<script src="app.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
