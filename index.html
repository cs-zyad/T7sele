<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>تحصيلي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --g: #00C896;
  --gd: #009E77;
  --gl: #E6FAF5;
  --ink: #0D1F1A;
  --white: #FFFFFF;
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; font-family:'Cairo',sans-serif; }
body { background:#0a0a0a; display:flex; align-items:center; justify-content:center; }

/* PHONE */
.phone {
  width:390px; height:844px;
  border-radius:50px; overflow:hidden;
  position:relative;
  box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.07);
}

/* ══ SPLASH ══ */
.splash {
  width:100%; height:100%;
  background: var(--ink);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}

/* dot grid */
.splash::before {
  content:'';
  position:absolute; inset:0;
  background-image: radial-gradient(rgba(0,200,150,0.06) 1px, transparent 1px);
  background-size: 22px 22px;
}

/* ambient glow */
.glow-1 {
  position:absolute;
  width:500px; height:500px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(0,200,150,0.1) 0%, transparent 65%);
  top:-100px; left:50%; transform:translateX(-50%);
  animation: breathe 5s ease-in-out infinite;
}

.glow-2 {
  position:absolute;
  width:300px; height:300px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(0,200,150,0.06) 0%, transparent 65%);
  bottom:-80px; left:50%; transform:translateX(-50%);
  animation: breathe 5s ease-in-out infinite reverse;
}

@keyframes breathe {
  0%,100% { transform:translateX(-50%) scale(1); opacity:1; }
  50% { transform:translateX(-50%) scale(1.15); opacity:0.7; }
}

/* content */
.splash-content {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  align-items:center; text-align:center;
  padding:0 40px;
}

/* APP ICON */
.app-icon {
  width:110px; height:110px;
  border-radius:28px;
  background: var(--g);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:32px;
  position:relative; overflow:hidden;
  animation: iconIn 0.9s cubic-bezier(.16,1,.3,1) both;
  box-shadow: 0 0 0 1px rgba(0,200,150,0.3), 0 24px 60px rgba(0,200,150,0.25), 0 0 80px rgba(0,200,150,0.1);
}

.app-icon::before {
  content:'';
  position:absolute;
  top:-10px; left:-10px;
  width:70px; height:70px;
  background:rgba(255,255,255,0.12);
  border-radius:50%;
}

.app-icon::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(145deg,rgba(255,255,255,0.15) 0%,transparent 55%);
}

@keyframes iconIn {
  from { opacity:0; transform:scale(0.5) translateY(30px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

/* book svg */
.book-svg { position:relative; z-index:1; }

/* APP NAME */
.app-name {
  font-size:4rem;
  font-weight:900;
  color:white;
  line-height:1;
  letter-spacing:-1.5px;
  margin-bottom:6px;
  animation: fadeUp 0.9s 0.15s cubic-bezier(.16,1,.3,1) both;
}

.app-name em {
  color:var(--g);
  font-style:normal;
}

.app-name-en {
  font-family:'Plus Jakarta Sans', sans-serif;
  font-size:0.65rem;
  letter-spacing:7px;
  color:rgba(255,255,255,0.2);
  font-weight:700;
  margin-bottom:14px;
  animation: fadeUp 0.9s 0.2s cubic-bezier(.16,1,.3,1) both;
}

.app-tagline {
  font-size:0.9rem;
  color:rgba(255,255,255,0.4);
  font-weight:400;
  line-height:1.7;
  margin-bottom:56px;
  max-width:260px;
  animation: fadeUp 0.9s 0.25s cubic-bezier(.16,1,.3,1) both;
}

.app-tagline strong { color:var(--g); font-weight:700; }

/* BUTTONS */
.splash-btns {
  width:100%;
  display:flex;
  flex-direction:column;
  gap:12px;
  animation: fadeUp 0.9s 0.35s cubic-bezier(.16,1,.3,1) both;
}

.btn-start {
  width:100%;
  background: var(--g);
  color: var(--ink);
  border:none;
  padding:18px;
  border-radius:18px;
  font-family:'Cairo',sans-serif;
  font-size:1rem;
  font-weight:900;
  cursor:pointer;
  box-shadow: 0 8px 32px rgba(0,200,150,0.35);
  transition:all .2s;
  letter-spacing:0.5px;
}

.btn-start:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(0,200,150,0.4); }
.btn-start:active { transform:translateY(0); }

.btn-login {
  width:100%;
  background:transparent;
  color:rgba(255,255,255,0.5);
  border:1.5px solid rgba(255,255,255,0.1);
  padding:16px;
  border-radius:18px;
  font-family:'Cairo',sans-serif;
  font-size:0.9rem;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
}

.btn-login:hover {
  border-color:rgba(0,200,150,0.3);
  color:rgba(255,255,255,0.75);
  background:rgba(0,200,150,0.05);
}

.btn-login span { color:var(--g); font-weight:700; }

/* DIVIDER */
.divider {
  display:flex; align-items:center; gap:12px;
  width:100%;
}

.divider-line {
  flex:1; height:1px;
  background:rgba(255,255,255,0.06);
}

.divider-text {
  font-size:0.65rem;
  color:rgba(255,255,255,0.2);
  font-weight:600;
  white-space:nowrap;
}

/* FOOTER */
.splash-footer {
  position:absolute;
  bottom:32px; left:0; right:0;
  text-align:center;
  animation: fadeUp 0.9s 0.5s both;
}

.footer-text {
  font-size:0.62rem;
  color:rgba(255,255,255,0.12);
  line-height:1.6;
}

.footer-text a { color:rgba(0,200,150,0.4); text-decoration:none; }

/* SCROLL HINT */
.scroll-hint {
  position:absolute;
  bottom:70px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:6px;
  opacity:0;
  animation: fadeIn 1s 1.5s both;
}

@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.scroll-line {
  width:1.5px; height:32px;
  background:linear-gradient(to bottom, transparent, rgba(0,200,150,0.4));
  animation: scrollAnim 2s ease-in-out infinite;
}

@keyframes scrollAnim {
  0%,100% { opacity:0.4; transform:scaleY(1); }
  50% { opacity:1; transform:scaleY(1.2); }
}

/* PILLS */
.pills {
  display:flex; gap:8px; justify-content:center;
  margin-bottom:40px;
  animation: fadeUp 0.9s 0.3s cubic-bezier(.16,1,.3,1) both;
}

.pill {
  padding:6px 14px;
  border-radius:20px;
  font-size:0.68rem;
  font-weight:600;
}

.pill-green { background:rgba(0,200,150,0.12); color:var(--g); border:1px solid rgba(0,200,150,0.2); }
.pill-gray { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.3); border:1px solid rgba(255,255,255,0.08); }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}

/* STARS / particles */
.star {
  position:absolute;
  width:2px; height:2px;
  border-radius:50%;
  background:rgba(0,200,150,0.4);
  animation: twinkle 3s ease-in-out infinite;
}

@keyframes twinkle {
  0%,100% { opacity:0; transform:scale(0); }
  50% { opacity:1; transform:scale(1); }
}

/* Island */
.dynamic-island {
  width: 120px; height: 34px;
  background: #000;
  border-radius: 20px;
  position: absolute;
  top: 10px; left: 50%; transform: translateX(-50%);
  z-index: 101;
}
</style>
</head>
<body>

<div class="phone">
  <div class="dynamic-island"></div>
  <div class="splash">

    <!-- ambient -->
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <!-- particles -->
    <div class="star" style="top:15%;left:12%;animation-delay:0s"></div>
    <div class="star" style="top:22%;right:18%;animation-delay:0.8s;width:3px;height:3px"></div>
    <div class="star" style="top:65%;left:8%;animation-delay:1.4s"></div>
    <div class="star" style="top:72%;right:10%;animation-delay:0.4s;width:3px;height:3px"></div>
    <div class="star" style="top:40%;left:5%;animation-delay:2s"></div>
    <div class="star" style="top:35%;right:6%;animation-delay:1.1s"></div>

    <!-- MAIN CONTENT -->
    <div class="splash-content">

      <!-- Icon -->
      <div class="app-icon">
        <svg class="book-svg" width="64" height="64" viewBox="0 0 80 80" fill="none">
          <!-- left page -->
          <path d="M14 24C14 22.3 15.3 21 17 21H37V59H17C15.3 59 14 57.7 14 56V24Z" fill="white" opacity="0.95"/>
          <path d="M34 21H37V59H34C32.8 59 32.2 57.8 32.8 56.8L35 40L32.8 23.2C32.2 22.2 32.8 21 34 21Z" fill="rgba(0,140,90,0.18)"/>
          <!-- left lines -->
          <line x1="19" y1="30" x2="30" y2="30" stroke="rgba(0,200,150,0.55)" stroke-width="2" stroke-linecap="round"/>
          <line x1="19" y1="37" x2="30" y2="37" stroke="rgba(0,200,150,0.38)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="19" y1="44" x2="30" y2="44" stroke="rgba(0,200,150,0.25)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="19" y1="51" x2="26" y2="51" stroke="rgba(0,200,150,0.18)" stroke-width="1.2" stroke-linecap="round"/>
          <!-- right page -->
          <path d="M66 24C66 22.3 64.7 21 63 21H43V59H63C64.7 59 66 57.7 66 56V24Z" fill="white" opacity="0.65"/>
          <path d="M46 21H43V59H46C47.2 59 47.8 57.8 47.2 56.8L45 40L47.2 23.2C47.8 22.2 47.2 21 46 21Z" fill="rgba(0,140,90,0.1)"/>
          <!-- right lines -->
          <line x1="50" y1="30" x2="61" y2="30" stroke="rgba(0,200,150,0.38)" stroke-width="2" stroke-linecap="round"/>
          <line x1="50" y1="37" x2="61" y2="37" stroke="rgba(0,200,150,0.25)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="50" y1="44" x2="58" y2="44" stroke="rgba(0,200,150,0.18)" stroke-width="1.2" stroke-linecap="round"/>
          <!-- spine -->
          <line x1="40" y1="21" x2="40" y2="59" stroke="rgba(0,120,70,0.2)" stroke-width="1.2"/>
          <!-- shadow -->
          <ellipse cx="40" cy="60" rx="23" ry="3" fill="rgba(0,0,0,0.18)"/>
          <!-- badge -->
          <circle cx="57" cy="26" r="12" fill="#0D1F1A"/>
          <circle cx="57" cy="26" r="10" fill="#0D1F1A" stroke="rgba(0,200,150,0.25)" stroke-width="1"/>
          <polyline points="52.5,26 55.5,29.5 62,22" stroke="#00C896" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <!-- Name -->
      <div class="app-name">تح<em>صي</em>لي</div>
      <div class="app-name-en">T A H S I L I</div>

      <!-- Tagline -->
      <div class="app-tagline">
        استعد لاختبارك <strong>بذكاء</strong><br>
        خطة يومية تتكيف مع أدائك
      </div>

      <!-- Pills -->
      <div class="pills">
        <div class="pill pill-green">طلاب الثانوي 🎯</div>
        <div class="pill pill-gray">علمي · أدبي</div>
        <div class="pill pill-gray">iOS · Android</div>
      </div>

      <!-- Buttons -->
      <div class="splash-btns">
        <button class="btn-start" onclick="goToRegister()">
          ابدأ رحلتك ←
        </button>
        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-text">أو</div>
          <div class="divider-line"></div>
        </div>
        <button class="btn-login" onclick="goToLogin()">
          عندك حساب؟ <span>سجّل دخولك</span>
        </button>
      </div>

    </div>

    <!-- Footer -->
    <div class="splash-footer">
      <div class="footer-text">
        بالمتابعة توافق على <a href="#">شروط الاستخدام</a> و<a href="#">سياسة الخصوصية</a>
      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>
<script>
function goToRegister() {
  window.location.href = 'onboarding.html';
}

function goToLogin() {
  window.location.href = 'login.html';
}
</script>
</body>
</html>
